databaseChangeLog:
  - changeSet:
      id: 003-create-devices
      author: bootcamp
      changes:
        - createTable:
            tableName: devices
            columns:
              - column:
                  name: device_id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_devices
              - column:
                  name: device_fingerprint
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_devices_fingerprint
              - column:
                  name: device_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: os_name
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: os_version
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: device_model
                  type: VARCHAR(100)
              - column:
                  name: screen_resolution
                  type: VARCHAR(20)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
