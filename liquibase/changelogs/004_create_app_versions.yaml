databaseChangeLog:
  - changeSet:
      id: 004-create-app-versions
      author: bootcamp
      changes:
        - createTable:
            tableName: app_versions
            columns:
              - column:
                  name: version_id
                  type: SERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_app_versions
              - column:
                  name: version_code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_app_versions_code
              - column:
                  name: platform
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: release_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: is_force_update
                  type: BOOLEAN
                  defaultValueBoolean: false
